# Note: this is a shared pipeline used by other repositories.
# Docs: https://docs.github.com/en/actions/using-workflows/reusing-workflows

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
      working-directory:
        type: string
        description: Working directory for setup (where package.json with packageManager is)
        required: false
        default: .
      cwd:
        type: string
        description: The directory containing the MDX files
      files:
        type: string
        description: The glob pattern for MDX files
        required: false
      content-dir:
        type: string
        description: The content directory for Fumadocs-style projects (auto-discovers files)
        required: false
      verbose:
        type: boolean
        description: Whether to print all scanned files
        default: false
      version:
        type: string
        description: The version of the package to validate
        default: 'latest'

jobs:
  validate-mdx-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        name: checkout

      - uses: the-guild-org/shared-config/setup@v1
        name: setup env
        id: setup
        with:
          node-version: ${{inputs.node-version}}
          working-directory: ${{inputs.working-directory}}

      - name: validate links
        working-directory: ${{inputs.cwd}}
        run: |
          ${{ steps.setup.outputs.package-manager == 'bun' && 'bunx' || format('{0} dlx', steps.setup.outputs.package-manager) }} validate-mdx-links@${{inputs.version}} \
            --cwd . \
            ${{inputs.files && format('--files {0}', inputs.files) || ''}} \
            ${{inputs['content-dir'] && format('--content-dir {0}', inputs['content-dir']) || ''}} \
            ${{inputs.verbose && '--verbose' || ''}}
